services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aio
      POSTGRES_PASSWORD: aio
      POSTGRES_DB: aio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aio"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file:
      - .env
    environment:
      # Long-term + semantic memory both live in this one database -- no
      # separate vector-DB service anymore (see memory/semantic.py).
      DATABASE_URL: postgresql+psycopg2://aio:aio@postgres:5432/aio
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # Optional local orchestration engine JARVIS can fire a completion webhook
  # into (see integrations/n8n.py). Not required for the core pipeline --
  # only start this if you're building n8n workflows against JARVIS; set
  # N8N_BASE_URL=http://localhost:5678 in .env to enable the webhook call.
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    profiles:
      - n8n

volumes:
  postgres_data:
  n8n_data:
